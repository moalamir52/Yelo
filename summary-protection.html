<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Summary Protection</title>
    <script>
        // حماية فورية لموقع Summary
        (function() {
            // فحص المصادقة من YELO
            const authData = localStorage.getItem('yelo_auth');
            
            if (!authData) {
                alert('Access Denied! Please login through YELO system first.');
                window.location.replace('https://moalamir52.github.io/Yelo/login.html');
                return;
            }
            
            try {
                const parsed = JSON.parse(authData);
                const now = new Date().getTime();
                
                if (!parsed.expiry || now >= parsed.expiry || !parsed.user) {
                    localStorage.removeItem('yelo_auth');
                    alert('Session expired! Please login again.');
                    window.location.replace('https://moalamir52.github.io/Yelo/login.html');
                    return;
                }
                
                // فحص الصلاحية لمشروع Summary
                const hasPermission = parsed.permissions.includes('all') || parsed.permissions.includes('summary');
                
                if (!hasPermission) {
                    alert('Access Denied! You don\'t have permission for Summary project.');
                    window.location.replace('https://moalamir52.github.io/Yelo/');
                    return;
                }
                
                // إعادة التوجيه للموقع الأصلي مع الحماية
                window.location.replace('https://moalamir52.github.io/Summary/?protected=true');
                
            } catch (error) {
                localStorage.removeItem('yelo_auth');
                alert('Authentication error! Please login again.');
                window.location.replace('https://moalamir52.github.io/Yelo/login.html');
            }
        })();
    </script>
</head>
<body>
    <div style="text-align: center; margin-top: 100px; font-family: Arial;">
        <h2>Checking Access Permissions...</h2>
        <p>Please wait while we verify your access to Summary project.</p>
    </div>
</body>
</html>
