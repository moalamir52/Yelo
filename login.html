<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Login - YELO System</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #6a1b9a 0%, #ffd600 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h2 {
      color: #6a1b9a;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .login-header p {
      color: #666;
      font-size: 14px;
    }

    .form-control {
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      padding: 12px 15px;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: #6a1b9a;
      box-shadow: 0 0 0 0.2rem rgba(106, 27, 154, 0.25);
    }

    .btn-login {
      background: linear-gradient(135deg, #6a1b9a 0%, #8e24aa 100%);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      width: 100%;
      transition: all 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(106, 27, 154, 0.4);
    }

    .alert {
      border-radius: 10px;
      border: none;
    }

    .input-group-text {
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 10px 0 0 10px;
    }

    .form-control.with-icon {
      border-radius: 0 10px 10px 0;
    }

    .loading {
      display: none;
    }

    .loading.show {
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h2><i class="fas fa-shield-alt"></i> YELO System</h2>
      <p>Login to access the dashboard</p>
    </div>

    <div id="alertContainer"></div>

    <form id="loginForm">
      <div class="mb-3">
        <div class="input-group">
          <span class="input-group-text">
            <i class="fas fa-user"></i>
          </span>
          <input type="text" class="form-control with-icon" id="username" placeholder="Username" required>
        </div>
      </div>

      <div class="mb-4">
        <div class="input-group">
          <span class="input-group-text">
            <i class="fas fa-lock"></i>
          </span>
          <input type="password" class="form-control with-icon" id="password" placeholder="Password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-login">
        <span class="loading">
          <i class="fas fa-spinner fa-spin"></i>
        </span>
        <span class="login-text">Login</span>
      </button>
    </form>

    <div class="text-center mt-3">
      <small class="text-muted">
        <i class="fas fa-info-circle"></i>
        To get an account, contact the administrator
      </small>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // نظام المصادقة المحدث
    const simpleAuth = {
      login: function(username, password) {
        // بيانات تسجيل الدخول الافتراضية
        const defaultCredentials = {
          'admin': { password: 'admin123', role: 'admin', permissions: ['all'] },
          'user1': { password: 'password123', role: 'user', permissions: ['contracts', 'maintenance'] },
          'mohamed': { password: 'yelo2025', role: 'user', permissions: ['contracts', 'maintenance'] }
        };
        
        // فحص المستخدمين المحفوظين في localStorage
        const savedUsers = JSON.parse(localStorage.getItem('yelo_users') || '[]');
        
        // البحث في المستخدمين المحفوظين أولاً
        const savedUser = savedUsers.find(u => u.username === username && u.password === password && u.isActive);
        
        if (savedUser) {
          const authData = {
            user: {
              username: savedUser.username,
              role: savedUser.role,
              loginTime: new Date().toISOString()
            },
            permissions: savedUser.permissions,
            expiry: new Date().getTime() + (24 * 60 * 60 * 1000) // 24 ساعة
          };
          
          localStorage.setItem('yelo_auth', JSON.stringify(authData));
          return { success: true, user: authData.user };
        }
        
        // فحص المستخدمين الافتراضيين
        if (defaultCredentials[username] && defaultCredentials[username].password === password) {
          const userInfo = defaultCredentials[username];
          const authData = {
            user: {
              username: username,
              role: userInfo.role,
              loginTime: new Date().toISOString()
            },
            permissions: userInfo.permissions,
            expiry: new Date().getTime() + (24 * 60 * 60 * 1000) // 24 ساعة
          };
          
          localStorage.setItem('yelo_auth', JSON.stringify(authData));
          return { success: true, user: authData.user };
        }
        
        return { success: false, message: 'Invalid username or password' };
      }
    };
  </script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loadingSpinner = document.querySelector('.loading');
      const loginText = document.querySelector('.login-text');
      const submitBtn = document.querySelector('.btn-login');
      
      // إظهار حالة التحميل
      loadingSpinner.classList.add('show');
      loginText.textContent = 'Verifying...';
      submitBtn.disabled = true;
      
      try {
        const result = simpleAuth.login(username, password);
        
        if (result.success) {
          showAlert('Login successful! Redirecting...', 'success');
          
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } else {
          showAlert(result.message, 'danger');
        }
      } catch (error) {
        showAlert('An unexpected error occurred. Please try again.', 'danger');
      } finally {
        // إخفاء حالة التحميل
        loadingSpinner.classList.remove('show');
        loginText.textContent = 'Login';
        submitBtn.disabled = false;
      }
    });

    function showAlert(message, type) {
      const alertContainer = document.getElementById('alertContainer');
      const alertHtml = `
        <div class="alert alert-${type} alert-dismissible fade show" role="alert">
          <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'}"></i>
          ${message}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      `;
      alertContainer.innerHTML = alertHtml;
      
      // إزالة التنبيه تلقائياً بعد 5 ثوان
      setTimeout(() => {
        const alert = alertContainer.querySelector('.alert');
        if (alert) {
          alert.remove();
        }
      }, 5000);
    }

    // فحص إذا كان المستخدم مسجل دخول بالفعل
    document.addEventListener('DOMContentLoaded', () => {
      const authData = localStorage.getItem('yelo_auth');
      if (authData) {
        try {
          const parsed = JSON.parse(authData);
          const now = new Date().getTime();
          if (parsed.expiry && now < parsed.expiry) {
            window.location.href = 'index.html';
          }
        } catch (error) {
          localStorage.removeItem('yelo_auth');
        }
      }
    });
  </script>
</body>
</html>
