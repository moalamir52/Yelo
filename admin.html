<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>Admin Panel - YELO System</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .admin-header {
      background: linear-gradient(135deg, #6a1b9a 0%, #8e24aa 100%);
      color: white;
      padding: 20px 0;
      margin-bottom: 30px;
    }

    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
    }

    .card-header {
      background: linear-gradient(135deg, #6a1b9a 0%, #8e24aa 100%);
      color: white;
      border-radius: 15px 15px 0 0 !important;
      font-weight: bold;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6a1b9a 0%, #8e24aa 100%);
      border: none;
      border-radius: 10px;
    }

    .btn-danger {
      border-radius: 10px;
    }

    .btn-success {
      border-radius: 10px;
    }

    .form-control {
      border-radius: 10px;
      border: 2px solid #e0e0e0;
    }

    .form-control:focus {
      border-color: #6a1b9a;
      box-shadow: 0 0 0 0.2rem rgba(106, 27, 154, 0.25);
    }

    .table {
      border-radius: 10px;
      overflow: hidden;
    }

    .activity-item {
      padding: 10px;
      border-left: 4px solid #6a1b9a;
      margin-bottom: 10px;
      background: white;
      border-radius: 0 10px 10px 0;
    }

    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <!-- Back Button -->
  <a href="index.html" class="btn btn-secondary back-btn">
    <i class="fas fa-arrow-left"></i> Back to Dashboard
  </a>

  <!-- Page Header -->
  <div class="admin-header">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-12 text-center">
          <h2><i class="fas fa-cogs"></i> Admin Panel</h2>
          <p class="mb-2">User Management and Activity Monitoring</p>
          <span id="adminName" class="badge bg-warning text-dark fs-6">Administrator</span>
        </div>
      </div>
    </div>
  </div>

  <div class="container">
    <!-- إحصائيات سريعة -->
    <div class="row mb-4">
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <i class="fas fa-users fa-2x text-primary mb-2"></i>
            <h5 id="totalUsers">0</h5>
            <small class="text-muted">Total Users</small>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <i class="fas fa-sign-in-alt fa-2x text-success mb-2"></i>
            <h5 id="activeUsers">0</h5>
            <small class="text-muted">Active Users</small>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <i class="fas fa-chart-line fa-2x text-info mb-2"></i>
            <h5 id="totalActivities">0</h5>
            <small class="text-muted">Total Activities</small>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card text-center">
          <div class="card-body">
            <i class="fas fa-project-diagram fa-2x text-warning mb-2"></i>
            <h5>7</h5>
            <small class="text-muted">Active Projects</small>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <!-- Password Management -->
      <div class="col-md-12 mb-4">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="fas fa-key"></i> Password Management</span>
            <div>
              <button class="btn btn-sm btn-outline-light" onclick="showAllPasswords()">
                <i class="fas fa-eye"></i> View All Passwords
              </button>
              <button class="btn btn-sm btn-outline-light" onclick="changeAdminPassword()">
                <i class="fas fa-user-shield"></i> Change Admin Password
              </button>
            </div>
          </div>
          <div class="card-body">
            <div id="passwordsList" style="display: none;">
              <!-- Passwords will be shown here -->
            </div>
            <div class="row">
              <div class="col-md-6">
                <h6>Change User Password</h6>
                <div class="input-group mb-3">
                  <select class="form-control" id="userSelect">
                    <option value="">Select User</option>
                  </select>
                  <input type="password" class="form-control" id="newUserPassword" placeholder="New Password">
                  <button class="btn btn-warning" onclick="changeUserPassword()">
                    <i class="fas fa-key"></i> Change
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <!-- User Management -->
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <i class="fas fa-user-plus"></i> Add New User
          </div>
          <div class="card-body">
            <form id="addUserForm">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" class="form-control" id="newUsername" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="newPassword" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Role</label>
                <select class="form-control" id="newRole">
                  <option value="user">Regular User</option>
                  <option value="admin">Administrator</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">Allowed Projects</label>
                <div class="row">
                  <div class="col-6">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" value="operations" id="perm_operations">
                      <label class="form-check-label" for="perm_operations">Operations Portal</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" value="contracts" id="perm_contracts">
                      <label class="form-check-label" for="perm_contracts">Contracts</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" value="contract-matcher" id="perm_contract_matcher">
                      <label class="form-check-label" for="perm_contract_matcher">Contract Matcher</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" value="maintenance" id="perm_maintenance">
                      <label class="form-check-label" for="perm_maintenance">Maintenance</label>
                    </div>
                  </div>
                  <div class="col-6">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" value="reports" id="perm_reports">
                      <label class="form-check-label" for="perm_reports">Reports</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" value="staff" id="perm_staff">
                      <label class="form-check-label" for="perm_staff">Staff</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" value="summary" id="perm_summary">
                      <label class="form-check-label" for="perm_summary">Summary</label>
                    </div>
                  </div>
                </div>
                <div class="form-check mt-2">
                  <input class="form-check-input" type="checkbox" value="all" id="perm_all">
                  <label class="form-check-label" for="perm_all"><strong>All Projects</strong></label>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-plus"></i> Add User
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Users List -->
      <div class="col-md-6">
        <div class="card">
          <div class="card-header">
            <i class="fas fa-users"></i> Registered Users
          </div>
          <div class="card-body">
            <div id="usersList">
              <!-- Users list will be populated by JavaScript -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Activity Log -->
    <div class="row mt-4">
      <div class="col-12">
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="fas fa-history"></i> Activity Log</span>
            <button class="btn btn-sm btn-outline-light" onclick="refreshActivities()">
              <i class="fas fa-refresh"></i> Refresh
            </button>
          </div>
          <div class="card-body" style="max-height: 400px; overflow-y: auto;">
            <div id="activitiesList">
              <!-- Activities will be populated by JavaScript -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Permissions Modal -->
  <div class="modal fade" id="editPermissionsModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="fas fa-key"></i> Edit User Permissions</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <h6 id="editUserName">User: </h6>
          <div class="row mt-3">
            <div class="col-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="operations" id="edit_operations">
                <label class="form-check-label" for="edit_operations">Operations Portal</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="contracts" id="edit_contracts">
                <label class="form-check-label" for="edit_contracts">Contracts</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="contract-matcher" id="edit_contract_matcher">
                <label class="form-check-label" for="edit_contract_matcher">Contract Matcher</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="maintenance" id="edit_maintenance">
                <label class="form-check-label" for="edit_maintenance">Maintenance</label>
              </div>
            </div>
            <div class="col-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="reports" id="edit_reports">
                <label class="form-check-label" for="edit_reports">Reports</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="staff" id="edit_staff">
                <label class="form-check-label" for="edit_staff">Staff</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" value="summary" id="edit_summary">
                <label class="form-check-label" for="edit_summary">Summary</label>
              </div>
            </div>
          </div>
          <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" value="all" id="edit_all">
            <label class="form-check-label" for="edit_all"><strong>All Projects</strong></label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveUserPermissions()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth-system.js"></script>
  <script src="js/admin-helper.js"></script>
  <script>
    // Check admin permissions
    document.addEventListener('DOMContentLoaded', function() {
      if (!window.authSystem || !window.authSystem.checkAuthStatus() || !window.authSystem.isAdmin()) {
        alert('You do not have permission to access this page');
        window.location.href = 'login.html';
        return;
      }

      document.getElementById('adminName').textContent = window.authSystem.currentUser.username;
      loadUsers();
      loadActivities();
      updateStats();
      loadUserSelect();
    });

    // Add new user
    document.getElementById('addUserForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('newUsername').value;
      const password = document.getElementById('newPassword').value;
      const role = document.getElementById('newRole').value;
      
      // Collect permissions
      const permissions = [];
      const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
      checkboxes.forEach(cb => permissions.push(cb.value));
      
      if (permissions.includes('all')) {
        permissions.length = 0;
        permissions.push('all');
      }
      
      // Use authSystem to create user
      try {
        if (!window.authSystem) {
          alert('Authentication system not loaded');
          return;
        }
        
        const userData = {
          username: username,
          password: password,
          role: role,
          permissions: permissions
        };
        
        window.authSystem.createUser(userData);
      } catch (error) {
        alert('Error: ' + error.message);
        return;
      }
      
      // Reload the list
      loadUsers();
      updateStats();
      loadUserSelect();
      
      // Clear the form
      document.getElementById('addUserForm').reset();
      
      alert('User added successfully');
    });

    // Load users list
    function loadUsers() {
      const users = JSON.parse(localStorage.getItem('yelo_users') || '[]');
      const usersList = document.getElementById('usersList');
      
      if (users.length === 0) {
        usersList.innerHTML = '<p class="text-muted text-center">No registered users</p>';
        return;
      }
      
      let html = '';
      users.forEach(user => {
        const permissionsText = user.permissions.includes('all') ? 'All Projects' : user.permissions.join(', ');
        const statusBadge = user.isActive ? 
          '<span class="badge bg-success">Active</span>' : 
          '<span class="badge bg-danger">Disabled</span>';
        
        html += `
          <div class="border rounded p-3 mb-2">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <h6 class="mb-1">${user.username} ${statusBadge}</h6>
                <small class="text-muted">Role: ${user.role === 'admin' ? 'Administrator' : 'User'}</small><br>
                <small class="text-muted">Permissions: ${permissionsText}</small>
              </div>
              <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-info" onclick="editUserPermissions(${user.id})" title="Edit Permissions">
                  <i class="fas fa-key"></i>
                </button>
                <button class="btn btn-outline-warning" onclick="toggleUserStatus(${user.id})" title="Toggle Status">
                  <i class="fas fa-${user.isActive ? 'ban' : 'check'}"></i>
                </button>
                <button class="btn btn-outline-danger" onclick="deleteUser(${user.id})" title="Delete User">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          </div>
        `;
      });
      
      usersList.innerHTML = html;
    }

    // Load activities
    function loadActivities() {
      const activities = JSON.parse(localStorage.getItem('yelo_activities') || '[]').reverse(); // Newest first
      const activitiesList = document.getElementById('activitiesList');
      
      if (activities.length === 0) {
        activitiesList.innerHTML = '<p class="text-muted text-center">No activities recorded</p>';
        return;
      }
      
      let html = '';
      activities.slice(0, 20).forEach(activity => { // Last 20 activities
        const date = new Date(activity.timestamp).toLocaleString('ar-EG');
        html += `
          <div class="activity-item">
            <div class="d-flex justify-content-between">
              <div>
                <strong>${activity.user}</strong> - ${activity.details}
              </div>
              <small class="text-muted">${date}</small>
            </div>
          </div>
        `;
      });
      
      activitiesList.innerHTML = html;
    }

    // Update statistics
    function updateStats() {
      const users = JSON.parse(localStorage.getItem('yelo_users') || '[]');
      const activities = JSON.parse(localStorage.getItem('yelo_activities') || '[]');
      
      document.getElementById('totalUsers').textContent = users.length;
      document.getElementById('activeUsers').textContent = users.filter(u => u.isActive).length;
      document.getElementById('totalActivities').textContent = activities.length;
    }

    // Toggle user status
    function toggleUserStatus(userId) {
      const users = JSON.parse(localStorage.getItem('yelo_users') || '[]');
      const user = users.find(u => u.id === userId);
      
      if (user) {
        user.isActive = !user.isActive;
        localStorage.setItem('yelo_users', JSON.stringify(users));
        
        logActivity('admin', 'user_status_changed', 
          `User ${user.username} ${user.isActive ? 'activated' : 'deactivated'}`);
        
        loadUsers();
        updateStats();
        loadUserSelect();
      }
    }

    // Delete user
    function deleteUser(userId) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      
      const users = JSON.parse(localStorage.getItem('yelo_users') || '[]');
      const userIndex = users.findIndex(u => u.id === userId);
      
      if (userIndex !== -1) {
        const deletedUser = users[userIndex];
        users.splice(userIndex, 1);
        localStorage.setItem('yelo_users', JSON.stringify(users));
        
        logActivity('admin', 'user_deleted', `Deleted user: ${deletedUser.username}`);
        
        loadUsers();
        updateStats();
        loadUserSelect();
      }
    }

    // Refresh activities
    function refreshActivities() {
      loadActivities();
    }

    // Control "All Projects" checkbox
    document.getElementById('perm_all').addEventListener('change', function() {
      const otherCheckboxes = document.querySelectorAll('input[type="checkbox"]:not(#perm_all)');
      if (this.checked) {
        otherCheckboxes.forEach(cb => {
          cb.checked = false;
          cb.disabled = true;
        });
      } else {
        otherCheckboxes.forEach(cb => cb.disabled = false);
      }
    });

    // Control "All Projects" checkbox in edit modal
    document.getElementById('edit_all').addEventListener('change', function() {
      const otherCheckboxes = document.querySelectorAll('#editPermissionsModal input[type="checkbox"]:not(#edit_all)');
      if (this.checked) {
        otherCheckboxes.forEach(cb => {
          cb.checked = false;
          cb.disabled = true;
        });
      } else {
        otherCheckboxes.forEach(cb => cb.disabled = false);
      }
    });

    let currentEditUserId = null;

    // Edit user permissions
    function editUserPermissions(userId) {
      const users = JSON.parse(localStorage.getItem('yelo_users') || '[]');
      const user = users.find(u => u.id === userId);
      
      if (!user) {
        alert('User not found');
        return;
      }
      
      currentEditUserId = userId;
      document.getElementById('editUserName').textContent = `User: ${user.username}`;
      
      // Clear all checkboxes
      const checkboxes = document.querySelectorAll('#editPermissionsModal input[type="checkbox"]');
      checkboxes.forEach(cb => {
        cb.checked = false;
        cb.disabled = false;
      });
      
      // Set current permissions
      user.permissions.forEach(permission => {
        const checkbox = document.getElementById(`edit_${permission}`);
        if (checkbox) {
          checkbox.checked = true;
        }
      });
      
      // Handle "all" permission
      if (user.permissions.includes('all')) {
        document.getElementById('edit_all').checked = true;
        const otherCheckboxes = document.querySelectorAll('#editPermissionsModal input[type="checkbox"]:not(#edit_all)');
        otherCheckboxes.forEach(cb => {
          cb.checked = false;
          cb.disabled = true;
        });
      }
      
      // Show modal
      const modal = new bootstrap.Modal(document.getElementById('editPermissionsModal'));
      modal.show();
    }

    // Save user permissions
    function saveUserPermissions() {
      if (!currentEditUserId) return;
      
      // Collect new permissions
      const permissions = [];
      const checkboxes = document.querySelectorAll('#editPermissionsModal input[type="checkbox"]:checked');
      checkboxes.forEach(cb => permissions.push(cb.value));
      
      if (permissions.includes('all')) {
        permissions.length = 0;
        permissions.push('all');
      }
      
      try {
        const users = JSON.parse(localStorage.getItem('yelo_users') || '[]');
        const user = users.find(u => u.id === currentEditUserId);
        
        if (user) {
          // Update permissions directly
          user.permissions = permissions;
          localStorage.setItem('yelo_users', JSON.stringify(users));
          
          // Log activity
          if (window.authSystem) {
            window.authSystem.logActivity(window.authSystem.currentUser.username, 'permissions_updated', `تم تحديث صلاحيات المستخدم: ${user.username}`);
          }
          
          alert('Permissions updated successfully!');
          
          // Close modal
          const modal = bootstrap.Modal.getInstance(document.getElementById('editPermissionsModal'));
          modal.hide();
          
          // Reload users list
          loadUsers();
          
          // Update passwords display if shown
          const passwordsList = document.getElementById('passwordsList');
          if (passwordsList.style.display === 'block') {
            showAllPasswords();
          }
        } else {
          alert('User not found');
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
      
      currentEditUserId = null;
    }

    // Load users in select dropdown
    function loadUserSelect() {
      const users = JSON.parse(localStorage.getItem('yelo_users') || '[]');
      const select = document.getElementById('userSelect');
      
      select.innerHTML = '<option value="">Select User</option>';
      users.forEach(user => {
        select.innerHTML += `<option value="${user.username}">${user.username}</option>`;
      });
    }

    // Show all passwords
    function showAllPasswords() {
      try {
        if (!window.authSystem) {
          alert('Authentication system not loaded');
          return;
        }
        const passwords = window.authSystem.getUserPasswords();
        const passwordsList = document.getElementById('passwordsList');
        
        let html = '<div class="alert alert-warning"><i class="fas fa-exclamation-triangle"></i> Sensitive Information - Handle with Care</div>';
        
        html += `<div class="row">`;
        html += `<div class="col-md-6">`;
        html += `<h6><i class="fas fa-user-shield"></i> Admin Password</h6>`;
        html += `<div class="card bg-danger text-white mb-3">`;
        html += `<div class="card-body">`;
        html += `<strong>admin:</strong> <span class="badge bg-light text-dark">${passwords.admin}</span>`;
        html += `</div></div></div>`;
        
        html += `<div class="col-md-6">`;
        html += `<h6><i class="fas fa-users"></i> User Passwords</h6>`;
        if (passwords.users.length === 0) {
          html += '<p class="text-muted">No users created yet</p>';
        } else {
          passwords.users.forEach(user => {
            html += `<div class="card bg-info text-white mb-2">`;
            html += `<div class="card-body py-2">`;
            html += `<strong>${user.username}:</strong> <span class="badge bg-light text-dark">${user.password}</span>`;
            html += `</div></div>`;
          });
        }
        html += `</div></div>`;
        
        passwordsList.innerHTML = html;
        passwordsList.style.display = 'block';
        
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    // Change admin password
    function changeAdminPassword() {
      const newPassword = prompt('Enter new admin password:');
      if (newPassword && newPassword.length >= 6) {
        try {
          if (!window.authSystem) {
            alert('Authentication system not loaded');
            return;
          }
          window.authSystem.updateAdminPassword(newPassword);
          alert('Admin password changed successfully!');
          
          // Update display if passwords are shown
          const passwordsList = document.getElementById('passwordsList');
          if (passwordsList.style.display === 'block') {
            showAllPasswords();
          }
        } catch (error) {
          alert('Error: ' + error.message);
        }
      } else {
        alert('Password must be at least 6 characters long');
      }
    }

    // Change user password
    function changeUserPassword() {
      const username = document.getElementById('userSelect').value;
      const newPassword = document.getElementById('newUserPassword').value;
      
      if (!username) {
        alert('Please select a user');
        return;
      }
      
      if (!newPassword || newPassword.length < 6) {
        alert('Password must be at least 6 characters long');
        return;
      }
      
      try {
        if (!window.authSystem) {
          alert('Authentication system not loaded');
          return;
        }
        window.authSystem.updateUserPassword(username, newPassword);
        alert(`Password changed successfully for user: ${username}`);
        
        // Clear the form
        document.getElementById('userSelect').value = '';
        document.getElementById('newUserPassword').value = '';
        
        // Update display if passwords are shown
        const passwordsList = document.getElementById('passwordsList');
        if (passwordsList.style.display === 'block') {
          showAllPasswords();
        }
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }
  </script>
</body>
</html>
